<div class="login-container">
  <div class="login-card">
    @if(isLoggedIn$ | async) {
      <span class="card-icon">👋</span>
      <h1>Welcome Back</h1>
      <p class="subtitle">You are logged in as <strong>{{ userRole$ | async }}</strong></p>
      <button class="btn btn-logout" (click)="logout()">Logout</button>
    } @else {
      <span class="card-icon">🔑</span>
      <h1>Sign In</h1>
      <p class="subtitle">Choose your login type to continue</p>
      <div class="btn-group">
        <button class="btn btn-admin" (click)="login('Admin')">Admin Login</button>
        <button class="btn btn-user" (click)="login('User')">User Login</button>
      </div>
    }
  </div>
</div>
